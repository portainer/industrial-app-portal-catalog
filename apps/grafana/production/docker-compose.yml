services:
   grafana:
    image: "grafana/grafana:((PIAP_IMAGE_VERSION))"
    ports:
      - '3000:3000'
    environment:
      - "GF_SECURITY_ADMIN_USER=((PIAP_ADMIN_USER))"
      - "GF_SECURITY_ADMIN_PASSWORD=((PIAP_ADMIN_PASSWORD))"
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  grafana-data:
