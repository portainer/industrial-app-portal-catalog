metadata:
  version: "1.0"
  updated: "2026-03-09T00:00:00Z"

defaults:
  source:
    git: "github.com/portainer/industrial-app-portal-catalog"
    ref: "main"

apps:
  cedalo-mc:
    metadata:
      name: "Cedalo Management Center"
      description: "Web-based management for Mosquitto MQTT broker"
      overview: "Commercial-grade Eclipse Mosquitto MQTT broker with Cedalo Management Center. This enterprise version provides a professional MQTT broker with an intuitive web-based management interface for configuring brokers, monitoring connections, managing clients, and analyzing message flows in real-time."
      publisher: "Cedalo"
      versions: ["2.8"]
      category: "messaging"
      icon: "https://portainer-io-assets.sfo2.cdn.digitaloceanspaces.com/industrial-app-portal/logos/cedalo-mosquitto.png"
      tags: ["mqtt", "broker", "messaging", "management"]
      screenshots:
        - "https://portainer-io-assets.sfo2.cdn.digitaloceanspaces.com/industrial-app-portal/screenshots/cedalo-mosquitto-mc-1.png"
      documentation: "https://cedalo.com/docs/"
    variants:
      - label: "Production"
        deployment:
          compose:
            path: "apps/cedalo-mc/production/docker-compose.yml"
        configuration:
          variables:
            - name: "LICENSE_KEY"
              label: "Cedalo License Key"
            - name: "MC_USER"
              label: "Management Center Username"
              default: "admin"
            - name: "MC_PASSWORD"
              label: "Management Center Password"
            - name: "MC_BROKER_URL"
              label: "Mosquitto Broker URL"
              default: "mqtt://mosquitto.domain.tld:1883"
            - name: "MC_BROKER_PASSWORD"
              label: "Mosquitto Broker Admin Password"

  cedalo-mosquitto:
    metadata:
      name: "Cedalo Mosquitto Broker"
      description: "Enterprise-grade MQTT messaging broker"
      overview: "Commercial-grade Eclipse Mosquitto MQTT broker. This enterprise version provides a professional, high-performance MQTT broker with advanced features for reliable messaging in industrial and IoT environments. Supports MQTT 5.0 and 3.x protocols with enhanced security and scalability."
      publisher: "Cedalo"
      versions: ["2.8"]
      category: "messaging"
      icon: "https://portainer-io-assets.sfo2.cdn.digitaloceanspaces.com/industrial-app-portal/logos/cedalo-mosquitto.png"
      tags: ["mqtt", "broker", "messaging"]
      screenshots:
        - "https://portainer-io-assets.sfo2.cdn.digitaloceanspaces.com/industrial-app-portal/screenshots/cedalo-mosquitto-mc-1.png"
      documentation: "https://cedalo.com/docs/"
    variants:
      - label: "Production"
        deployment:
          compose:
            path: "apps/cedalo-mosquitto/production/docker-compose.yml"
        configuration:
          variables:
            - name: "LICENSE_KEY"
              label: "Cedalo License Key"
            - name: "MOSQUITTO_PASSWORD"
              label: "Admin Password"

  litmus-edge:
    metadata:
      name: "Litmus Edge"
      description: "Industrial IoT edge computing platform"
      overview: "Litmus Edge is an industrial edge computing platform that enables real-time data collection, normalization, and analysis from industrial equipment. It provides pre-built connectivity to thousands of industrial protocols and devices, with edge analytics, data transformation, and seamless cloud integration capabilities."
      publisher: "Litmus Automation"
      versions: ["latest"]
      category: "industrial-automation"
      icon: "https://portainer-io-assets.sfo2.cdn.digitaloceanspaces.com/industrial-app-portal/logos/litmus-edge.png"
      tags: ["edge-platform", "data-collection", "iot", "industrial"]
      screenshots:
        - "https://portainer-io-assets.sfo2.cdn.digitaloceanspaces.com/industrial-app-portal/screenshots/litmus-edge-1.png"
      documentation: "https://www.litmus.io/documentation/"
    variants:
      - label: "Production"
        deployment:
          compose:
            path: "apps/litmus-edge/production/docker-compose.yml"

  softing-edgeconnector-aggregator:
    metadata:
      name: "Softing EdgeConnector Aggregator"
      description: "Industrial data aggregation gateway"
      overview: "Softing edgeConnector Aggregator provides a powerful OPC UA aggregation service that consolidates data from multiple OPC UA sources into a single unified interface. It aggregates, filters, and republishes data via OPC UA and MQTT, simplifying complex industrial network architectures and reducing system integration complexity."
      publisher: "Softing Industrial"
      versions: ["v2025-03"]
      category: "industrial-automation"
      icon: "https://portainer-io-assets.sfo2.cdn.digitaloceanspaces.com/industrial-app-portal/logos/softing.png"
      tags: ["opc-ua", "mqtt", "aggregation", "protocol-gateway"]
      screenshots:
        - "https://portainer-io-assets.sfo2.cdn.digitaloceanspaces.com/industrial-app-portal/screenshots/softing-edgeaggregator-1.png"
      documentation: "https://industrial.softing.com/products/edgeconnector.html"
    variants:
      - label: "Production"
        deployment:
          compose:
            path: "apps/softing-edgeconnector-aggregator/production/docker-compose.yml"
        configuration:
          variables:
            - name: "TZ"
              label: "Timezone"
              default: "UTC"

  opc-router:
    metadata:
      name: "OPC Router"
      description: "No-code middleware for industrial applications"
      overview: "OPC Router is a powerful middleware solution that enables seamless data exchange between industrial automation systems, databases, cloud platforms, and enterprise applications. With its no-code approach, you can create complex data flows and integrations through an intuitive graphical interface without programming knowledge."
      publisher: "inray Industriesoftware GmbH"
      versions: ["4.28"]
      category: "industrial-automation"
      icon: "https://portainer-io-assets.sfo2.cdn.digitaloceanspaces.com/industrial-app-portal/logos/opc-router.png"
      tags: ["opc", "middleware", "integration", "automation"]
      screenshots:
        - "https://portainer-io-assets.sfo2.cdn.digitaloceanspaces.com/industrial-app-portal/screenshots/opc-router-1.png"
      documentation: "https://www.opc-router.com/documentation/"
    variants:
      - label: "Production"
        deployment:
          compose:
            path: "apps/opc-router/production/docker-compose.yml"

  ignition-gw:
    metadata:
      name: "Ignition Gateway"
      description: "Industrial application platform for SCADA/MES/IIoT"
      overview: "Ignition is a powerful industrial application platform with fully integrated development tools for building SCADA, MES, and IIoT solutions. It provides unlimited tags, clients, and connections with a single server license. The platform features cross-platform compatibility, real-time data visualization, and extensive protocol support including OPC-UA."
      publisher: "Inductive Automation"
      versions: ["8.1.8"]
      category: "industrial-automation"
      icon: "https://portainer-io-assets.sfo2.cdn.digitaloceanspaces.com/industrial-app-portal/logos/ignition-gateway.png"
      tags: ["scada", "mes", "hmi", "automation"]
      screenshots:
        - "https://portainer-io-assets.sfo2.cdn.digitaloceanspaces.com/industrial-app-portal/screenshots/ignition-gateway-1.png"
      documentation: "https://docs.inductiveautomation.com/"
    variants:
      - label: "Production"
        deployment:
          compose:
            path: "apps/ignition-gw/production/docker-compose.yml"
        configuration:
          variables:
            - name: "ADMIN_USER"
              label: "Gateway Admin Username"
              default: "admin"
            - name: "ADMIN_PASSWORD"
              label: "Gateway Admin Password"
            - name: "TZ"
              label: "Timezone"
              default: "UTC"

  node-red:
    metadata:
      name: "Node-RED"
      description: "Flow-based programming for IoT and automation"
      overview: "Node-RED is a flow-based development tool for visual programming developed originally by IBM for wiring together hardware devices, APIs and online services as part of the Internet of Things. It provides a browser-based flow editor that makes it easy to wire together flows using the wide range of nodes in the palette."
      publisher: "OpenJS Foundation"
      versions: ["4.1"]
      category: "industrial-automation"
      icon: "https://portainer-io-assets.sfo2.cdn.digitaloceanspaces.com/industrial-app-portal/logos/node-red.png"
      tags: ["automation", "low-code", "iot", "mqtt"]
      screenshots:
        - "https://portainer-io-assets.sfo2.cdn.digitaloceanspaces.com/industrial-app-portal/screenshots/node-red-1.jpeg"
      documentation: "https://nodered.org/docs/"
    variants:
      - label: "Production"
        deployment:
          compose:
            path: "apps/node-red/production/docker-compose.yml"
        configuration:
          variables:
            - name: "TZ"
              label: "Timezone"
              default: "UTC"

  grafana:
    metadata:
      name: "Grafana"
      description: "Monitoring and observability platform"
      overview: "Grafana is a multi-platform open source analytics and interactive visualization web application. It provides charts, graphs, and alerts for the web when connected to supported data sources. It is expandable through a plug-in system and is commonly used for visualizing time series data for infrastructure and application analytics."
      publisher: "Grafana Labs"
      versions: ["12.3"]
      category: "visualization"
      icon: "https://portainer-io-assets.sfo2.cdn.digitaloceanspaces.com/industrial-app-portal/logos/grafana.png"
      tags: ["visualization", "monitoring", "dashboards", "analytics"]
      screenshots:
        - "https://portainer-io-assets.sfo2.cdn.digitaloceanspaces.com/industrial-app-portal/screenshots/grafana-1.png"
      documentation: "https://grafana.com/docs/"
    variants:
      - label: "Production"
        deployment:
          compose:
            path: "apps/grafana/production/docker-compose.yml"
        configuration:
          variables:
            - name: "ADMIN_USER"
              label: "Admin Username"
              default: "admin"
            - name: "ADMIN_PASSWORD"
              label: "Admin Password"

  softing-sdex-suite:
    metadata:
      name: "Softing SDEX Suite"
      description: "Platform for Industrial Data Integration"
      overview: "Softing SDEX Suite is a unified platform combining OPC UA, MQTT, and edge technologies for seamless industrial data exchange. It integrates proven connectivity solutions to access data from PLCs, CNC machines, and IoT devices without control program modifications, consolidating shopfloor data for ERP, MES, and cloud systems."
      publisher: "Softing Industrial"
      versions: ["Beta1.00"]
      category: "industrial-automation"
      icon: "https://portainer-io-assets.sfo2.cdn.digitaloceanspaces.com/industrial-app-portal/logos/softing.png"
      tags: ["opc-ua", "mqtt", "aggregation", "protocol-gateway"]
      screenshots:
        - "https://portainer-io-assets.sfo2.cdn.digitaloceanspaces.com/industrial-app-portal/screenshots/softing-edgeaggregator-1.png"
      documentation: "https://industrial.softing.com/products/sdex-suite.html"
    variants:
      - label: "Beta"
        deployment:
          compose:
            path: "apps/softing-sdex-suite/beta/docker-compose.yml"
        configuration:
          files:
            - label: "Offline Configuration"
              device_path: "/config/offline/config.yaml"
              container_path: "/config/offline/config.yaml"
              templates:
                default:
                  name: "Default Configuration"
                  description: "Default offline configuration with Siemens S7, Modbus, and authentication"
                  path: "apps/softing-sdex-suite/beta/offline-config.yaml"
          variables:
            - name: "S7_CONNECTION_NAME"
              label: "Siemens S7 Connection Name"
            - name: "S7_CONNECTION_ADDRESS"
              label: "Siemens S7 PLC Address"
            - name: "MODBUS_CONNECTION_NAME"
              label: "Modbus Connection Name"
            - name: "MODBUS_CONNECTION_ADDRESS"
              label: "Modbus Device Address"
            - name: "AUTH_USERNAME"
              label: "Authentication Username"
            - name: "AUTH_USER_DESCRIPTION"
              label: "User Description"
