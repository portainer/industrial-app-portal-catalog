version: "3.8"

services:
  nodered:
    # PIAP replaces ((PIAP_IMAGE_VERSION)) with user-selected version before deployment
    image: nodered/node-red:((PIAP_IMAGE_VERSION))
    container_name: nodered
    restart: unless-stopped
    ports:
      - "1880:1880"
    environment:
      - TZ=UTC
    # Named volume for persistent Node-RED data
    # Configuration file bind mounts are injected by PIAP before Edge Stack deployment
    volumes:
      - nodered_data:/data

volumes:
  nodered_data:
    driver: local

networks:
  default:
    driver: bridge
